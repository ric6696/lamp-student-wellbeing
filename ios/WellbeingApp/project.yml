name: WellbeingApp
options:
  bundleIdPrefix: com.lamp.wellbeing.kevin
settings:
  USER_ID: kevin
targets:
  WellbeingApp:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources
      - path: Resources
    settings:
      INFOPLIST_FILE: Resources/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.lamp.wellbeing.$(USER_ID).app
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    configFiles:
      Debug: Configs/Project.xcconfig
      Release: Configs/Project.xcconfig
    capabilities:
      HealthKit: {}
    entitlements:
      path: Resources/WellbeingApp.entitlements
    dependencies:
      - sdk: HealthKit.framework
      - sdk: CoreLocation.framework
      - sdk: CoreMotion.framework
      - sdk: AVFoundation.framework
      - sdk: SoundAnalysis.framework
      - sdk: WatchConnectivity.framework
      - target: WellbeingWatchApp

  WellbeingWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchApp/Resources
    settings:
      INFOPLIST_FILE: WatchApp/Resources/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.lamp.wellbeing.$(USER_ID).app.watchapp
      WK_COMPANION_APP_BUNDLE_IDENTIFIER: com.lamp.wellbeing.$(USER_ID).app
    configFiles:
      Debug: Configs/Project.xcconfig
      Release: Configs/Project.xcconfig
    dependencies:
      - target: WellbeingWatchExtension

  WellbeingWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WatchExtension/Sources
      - path: WatchExtension/Resources
    settings:
      INFOPLIST_FILE: WatchExtension/Resources/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.lamp.wellbeing.$(USER_ID).app.watchapp.extension
      WK_APP_BUNDLE_IDENTIFIER: com.lamp.wellbeing.$(USER_ID).app.watchapp
    configFiles:
      Debug: Configs/Project.xcconfig
      Release: Configs/Project.xcconfig
    capabilities:
      HealthKit: {}
    entitlements:
      path: WatchExtension/Resources/WellbeingWatchExtension.entitlements
    dependencies:
      - sdk: HealthKit.framework
      - sdk: WatchConnectivity.framework
      - sdk: CoreMotion.framework
